---
services:
  weaviate:
    command:
    - --host
    - 0.0.0.0
    - --port
    - '8080'
    - --scheme
    - http
    image: cr.weaviate.io/semitechnologies/weaviate:1.36.9
    ports:
    - 8080:8080
    - 50051:50051
    volumes:
      - ./weaviate_data:/var/lib/weaviate
    restart: on-failure:0
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      CLUSTER_HOSTNAME: 'PeriodicalDB'
    networks:
      - weaviate_net
  # wvsee (Next.js Weaviate Collections Explorer)
  wvsee:
    image: rjalexa/wvsee:latest
    ports:
      - "3200:3000"            # wvsee web UI
    environment:
      - WEAVIATE_URL=http://weaviate:8080
      - WEAVIATE_HOST=weaviate
      - WEAVIATE_PORT=8080
    depends_on:
      - weaviate
    networks:
      - weaviate_net

  # WeaviateDB‑Cluster‑WebApp (Streamlit UI)
  weaviate_cluster_webapp:
    build:
      context: ./weaviate-cluster-webapp
      dockerfile: Dockerfile
    ports:
      - "8501:8501"            # Streamlit UI
    environment:
      - WEAVIATE_URL=http://weaviate:8080
    depends_on:
      - weaviate
    networks:
      - weaviate_net

networks:
  weaviate_net:
    driver: bridge